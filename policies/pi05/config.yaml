# π0.5 (pi05) — flow-matching VLA, longer language context.
# ⚠️  REQUIRES PALIGEMMA WEIGHTS (~5 GB, gated HuggingFace download):
#     huggingface-cli login
#     # accept licence: https://huggingface.co/google/paligemma-3b-pt-224
# Run from repo root:
#     python common/train.py --policy pi05
#
# Key difference from pi0: tokenizer_max_length=200 (vs 48) — richer language.

dataset:
  root: "../so101-fr5-teleop/lerobot_dataset"
  chunk_size: 50
  use_image: true
  image_size: [224, 224]
  val_frac: 0.1
  aug_level: "crops"

model:
  state_dim: 7
  action_dim: 7
  paligemma_variant: "gemma_2b"
  action_expert_variant: "gemma_300m"
  max_state_dim: 32
  max_action_dim: 32
  tokenizer_max_length: 200    # longer than pi0's 48
  num_inference_steps: 10

  # proprioception handling — benchmark axis (see docs/proprioception_modes.md)
  #   full | dropout | none   (override: python common/train.py --policy pi05 --proprio none)
  proprio_mode: full
  proprio_dropout_rate: 0.3

training:
  batch_size: 4
  lr: 2.5e-5
  weight_decay: 0.01
  max_epochs: 100
  grad_clip: 1.0
  save_every: 10
  log_every: 50
  checkpoint_dir: "policies/pi05/checkpoints"
  device: "cuda"
  seed: 42
