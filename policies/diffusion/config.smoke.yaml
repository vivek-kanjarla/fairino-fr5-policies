# Diffusion Policy — CPU smoke-test config.
# Run from repo root:
#   python common/smoke_test.py diffusion
dataset:
  root: "_smoke_dataset"
  chunk_size: 16
  use_image: true
  image_size: [224, 224]
  val_frac: 0.5

model:
  state_dim: 7
  action_dim: 7
  n_action_steps: 8
  down_dims: [64, 128, 256]
  kernel_size: 5
  n_groups: 4
  diffusion_step_embed_dim: 32
  use_film_scale_modulation: true
  num_train_timesteps: 10
  beta_schedule: "squaredcos_cap_v2"
  prediction_type: "epsilon"
  num_inference_steps: 2
  noise_scheduler_type: "DDPM"
  vision_backbone: "resnet18"
  pretrained_backbone_weights: null

training:
  batch_size: 2
  lr: 1.0e-4
  weight_decay: 1.0e-6
  max_epochs: 1
  grad_clip: 10.0
  save_every: 1
  log_every: 5
  checkpoint_dir: "policies/diffusion/checkpoints_smoke"
  device: "cpu"
  seed: 42
